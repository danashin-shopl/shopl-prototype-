<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근무지 상세 - Shopl</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #f5f6f8; color: #1a1a1a; min-height: 100vh; }

.gnb { height: 48px; background: #1b2135; display: flex; align-items: center; padding: 0 16px; gap: 0; position: sticky; top: 0; z-index: 100; }
.gnb-logo { color: #fff; font-size: 13px; font-weight: 700; padding: 0 12px; letter-spacing: -0.3px; }
.gnb-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.15); margin: 0 4px; }
.gnb-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: rgba(255,255,255,0.7); border-radius: 6px; border: none; background: none; }
.gnb-icon:hover { background: rgba(255,255,255,0.08); }
.gnb-page { color: #fff; font-size: 14px; font-weight: 500; padding: 0 8px; }
.gnb-right { margin-left: auto; display: flex; align-items: center; gap: 4px; }
.gnb-support { background: #2563eb; color: #fff; border: none; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: 500; margin-right: 4px; }
.gnb-lang { color: rgba(255,255,255,0.7); font-size: 12px; padding: 0 8px; cursor: pointer; display: flex; align-items: center; gap: 3px; }
.gnb-avatar { width: 28px; height: 28px; border-radius: 50%; background: #4f6bff; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: 600; cursor: pointer; margin-left: 4px; }

.page-wrap { max-width: 1100px; margin: 0 auto; padding: 20px 24px 60px; }

.back-btn { display: inline-flex; align-items: center; gap: 5px; color: #6b7280; font-size: 13px; cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 16px; }
.back-btn:hover { color: #374151; }

/* 헤더 카드 */
.header-area { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px 24px; margin-bottom: 1px; display: flex; align-items: flex-start; gap: 18px; }
.thumb-area { position: relative; flex-shrink: 0; }
.thumb { width: 84px; height: 84px; border-radius: 8px; background: #f3f4f6; border: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.thumb-count { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.5); color: #fff; font-size: 10px; border-radius: 4px; padding: 1px 5px; font-weight: 500; }
.thumb-nav { position: absolute; top: 50%; transform: translateY(-50%); display: flex; justify-content: space-between; width: 100%; left: 0; padding: 0 2px; pointer-events: none; }
.thumb-nav-btn { width: 20px; height: 20px; background: rgba(255,255,255,0.85); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 10px; color: #374151; pointer-events: all; }
.header-info { flex: 1; min-width: 0; }
.detail-code { display: inline-block; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 4px; padding: 2px 8px; font-size: 11px; color: #6b7280; margin-bottom: 6px; }
.detail-name { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
.icon-btn { background: none; border: none; cursor: pointer; color: #9ca3af; display: inline-flex; align-items: center; }
.icon-btn:hover { color: #6b7280; }
.detail-addr { font-size: 13px; color: #6b7280; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.badge-row { display: flex; gap: 6px; flex-wrap: wrap; }
.badge { display: inline-flex; align-items: center; gap: 4px; border-radius: 5px; padding: 3px 10px; font-size: 12px; font-weight: 500; }
.badge-active { background: #dcfce7; color: #15803d; }
.badge-photo { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
.badge-gps { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.badge-radius { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.header-map-thumb { width: 220px; height: 90px; border-radius: 8px; border: 1px solid #e5e7eb; overflow: hidden; flex-shrink: 0; background: #dce8f0; }
.header-map-thumb svg { width: 100%; height: 100%; }

/* 탭 */
.tabs-wrap { background: #fff; border-bottom: 1px solid #e5e7eb; border-top: 1px solid #e5e7eb; display: flex; padding: 0 24px; }
.tab { padding: 12px 4px; font-size: 14px; color: #6b7280; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; margin-right: 20px; }
.tab.active { color: #1a1a1a; font-weight: 600; border-bottom-color: #1a1a1a; }

/* 콘텐츠 */
.content-card { background: #fff; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 10px 10px; }

.sub-tabs-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #f3f4f6; }
.sub-tabs { display: flex; border: 1px solid #e5e7eb; border-radius: 7px; overflow: hidden; }
.sub-tab { padding: 5px 14px; font-size: 13px; color: #6b7280; cursor: pointer; background: #fff; border: none; border-right: 1px solid #e5e7eb; }
.sub-tab:last-child { border-right: none; }
.sub-tab.active { background: #f3f4f6; color: #1a1a1a; font-weight: 500; }
.edit-btn { padding: 6px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; background: #fff; color: #374151; cursor: pointer; }
.edit-btn:hover { background: #f9fafb; }

/* 정보 행 */
.info-row { display: grid; grid-template-columns: 140px 1fr; border-bottom: 1px solid #f3f4f6; padding: 14px 20px; align-items: start; }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: #6b7280; display: flex; align-items: center; gap: 6px; padding-top: 1px; }
.info-value { font-size: 13px; color: #1a1a1a; }
.copy-btn { display: inline-flex; align-items: center; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 4px; padding: 1px 8px; font-size: 11px; color: #6b7280; cursor: pointer; margin-left: 8px; vertical-align: middle; }
.copy-btn:hover { background: #e5e7eb; }

/* 지도 미리보기 */
.map-preview { margin: 14px 20px; border-radius: 8px; overflow: hidden; border: 1px solid #e5e7eb; background: #dce8f0; height: 200px; }
.map-preview svg { width: 100%; height: 100%; }
.acc-legend { display: flex; align-items: center; gap: 16px; padding: 8px 20px; border-top: 1px solid #f3f4f6; flex-wrap: wrap; }
.acc-legend-title { font-size: 12px; font-weight: 600; color: #374151; }
.acc-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #6b7280; }
.acc-dot { width: 7px; height: 7px; border-radius: 50%; }
.coord-text { padding: 6px 20px 14px; font-size: 12px; color: #9ca3af; }

.field-row { display: grid; grid-template-columns: 140px 1fr; padding: 11px 20px; border-bottom: 1px solid #f3f4f6; align-items: center; }
.field-row:last-child { border-bottom: none; }
.field-label { font-size: 13px; color: #6b7280; }
.field-value { font-size: 13px; color: #1a1a1a; }
</style>
</head>
